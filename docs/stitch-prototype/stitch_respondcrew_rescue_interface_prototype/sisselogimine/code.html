<body class="bg-background text-on-background min-h-screen flex flex-col font-body-md antialiased selection:bg-primary-fixed selection:text-on-primary-fixed">
<main class="flex-grow flex items-center justify-center p-container-padding relative overflow-hidden">
<!-- Background Image/Texture -->
<div class="absolute inset-0 z-0 bg-cover bg-center bg-no-repeat opacity-20" data-alt="A dramatic and professional wide shot of a stormy sea with a rescue vessel in the distance, cutting through the waves. The scene is rendered in deep sea blues and cool grays, evoking a sense of high-stakes reliability and maritime authority. The lighting is moody yet clear, emphasizing the harsh yet focused nature of sea rescue operations. The overall aesthetic perfectly matches a corporate modern interface focusing on utility and calm under pressure." style="background-image: url('https://lh3.googleusercontent.com/aida-public/AB6AXuAt2D0EwmVS1TbbVyMLk4l0tPl5cUxuDE7mLst_BIn10cL0Q6nhRvXaKIOEQC7LMICdt2uEaQX83WI3k_aqYsLuRXceRypnXLJsnlE1Xh-IlxNNPiMlQ2SNz3tAluI52-FAURuzef1NJ4GuEl6n5Pvaj5klR5n4QQwxB3Lg_M5TXhBpAmomhDueiTblZWc81Mdc34bPKeDORAzhPtQg8I-Yh7328fOfsWHdnd-B7OkUueFo_zC0tYQJ7r0YmDFhtuQa939NBAMGxaGo')">
</div>
<div class="absolute inset-0 z-0 bg-gradient-to-b from-background/80 via-background/95 to-background"></div>
<!-- Login Card -->
<div class="relative z-10 w-full max-w-md bg-surface border border-outline-variant rounded-xl shadow-[0_4px_12px_rgba(0,0,0,0.05)] p-section-margin flex flex-col gap-section-margin">
<!-- Header -->
<div class="text-center flex flex-col items-center gap-stack-gap">
<div class="w-16 h-16 bg-primary rounded-full flex items-center justify-center shadow-md mb-2">
<span class="material-symbols-outlined text-on-primary text-4xl" data-icon="anchor" style="font-variation-settings: 'FILL' 1;">anchor</span>
</div>
<h1 class="font-display-lg text-display-lg text-primary tracking-tight uppercase">RespondCrew</h1>
<p class="font-body-md text-body-md text-on-surface-variant max-w-[280px]">Vabatahtliku pääste valmisoleku ja väljakutsete juhtimine</p>
</div>
<!-- Form -->
<form action="#" class="flex flex-col gap-stack-gap" method="POST">
<div class="flex flex-col gap-unit">
<label class="font-label-bold text-label-bold text-on-surface" for="email">E-post</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="mail">mail</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface text-on-surface font-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-shadow h-touch-target-min" id="email" name="email" placeholder="nimi@organisatsioon.ee" required="" type="email"/>
</div>
</div>
<div class="flex flex-col gap-unit">
<label class="font-label-bold text-label-bold text-on-surface" for="password">Salasõna</label>
<div class="relative">
<div class="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none">
<span class="material-symbols-outlined text-outline" data-icon="lock">lock</span>
</div>
<input class="block w-full pl-10 pr-3 py-3 border border-outline-variant rounded-lg bg-surface text-on-surface font-body-md focus:ring-2 focus:ring-primary focus:border-primary transition-shadow h-touch-target-min" id="password" name="password" placeholder="••••••••" required="" type="password"/>
</div>
</div>
<div class="flex items-center justify-between mt-2">
<div class="flex items-center">
<input class="h-4 w-4 text-primary focus:ring-primary border-outline-variant rounded bg-surface" id="remember-me" name="remember-me" type="checkbox"/>
<label class="ml-2 block font-body-md text-body-md text-on-surface-variant" for="remember-me">Pea mind meeles</label>
</div>
<div class="text-sm">
<a class="font-label-bold text-label-bold text-primary hover:text-primary-container transition-colors" href="#">Unustasid salasõna?</a>
</div>
</div>
<!-- Actions -->
<div class="flex flex-col gap-stack-gap mt-4">
<button class="w-full flex items-center justify-center bg-primary text-on-primary font-label-bold text-label-bold rounded-lg h-[56px] uppercase tracking-wider shadow-sm hover:bg-primary-container active:scale-95 transition-all" type="submit">
                        Logi sisse
                        <span class="material-symbols-outlined ml-2" data-icon="login">login</span>
</button>
<button class="w-full flex items-center justify-center bg-surface border border-outline text-primary font-label-bold text-label-bold rounded-lg h-touch-target-min hover:bg-surface-container-low active:scale-95 transition-all" type="button">
                        Loo konto
                    </button>
</div>
</form>
<!-- Security Badge -->
<div class="flex items-center justify-center gap-2 mt-4 text-on-surface-variant opacity-70">
<span class="material-symbols-outlined text-sm" data-icon="verified_user">verified_user</span>
<span class="font-status-badge text-status-badge uppercase">Turvaline ühendus</span>
</div>
</div>
</main>
</body></html>
